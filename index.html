<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バーコードを よむ</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="バーコードを よむ">

    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background: #f7f9fa;
            user-select: none;
        }
        h1 {
            font-size: 26px;
            color: #333;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        .setsumei {
            font-size: 20px;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            min-height: 30px;
        }
        /* カメラ枠 */
        #reader {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            border: 5px solid #4CAF50;
            border-radius: 16px;
            overflow: hidden;
        }
        #reader button, #reader select {
            display: none !important;
        }
        /* 結果表示エリア */
        #result-box {
            margin-top: 20px;
            padding: 20px;
            background: #ffffff;
            border: 3px solid #ccc;
            border-radius: 16px;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        #result {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            word-break: break-all;
            margin: 10px 0;
        }
        /* ホームページを開く特大ボタン */
        .go-btn {
            display: none; 
            width: 100%;
            max-width: 450px;
            margin: 20px auto 0 auto;
            padding: 24px;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background-color: #2e7d32; /* 優しい深緑 */
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px #1b5e20;
            cursor: pointer;
        }
        .go-btn:active {
            box-shadow: none;
            transform: translateY(8px);
        }
    </style>
</head>
<body>

    <h1>バーコードを よむ</h1>
    <p id="guide" class="setsumei">しかくのなかに うつしてください</p>
    
    <div id="reader"></div>
    
    <div id="result-box">
        <div id="result">準備しています...</div>
    </div>

    <button id="go-btn" class="go-btn" onclick="openTargetUrl()">➔ ホームページをひらく</button>

    <script>
        let html5Qrcode = null; 
        let targetUrl = "";
        let audioCtx = null;

        // ピッ音を鳴らす関数（suspended制限＋エラー対策を追加）
        function playBeep() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                // 【さらに強化】ブラウザの制限で音が眠っていたら起こす（失敗してもエラーを出さない）
                if (audioCtx && audioCtx.state === "suspended") {
                    audioCtx.resume().catch(() => {});
                }

                let osc1 = audioCtx.createOscillator();
                let gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(2000, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.05);

                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(2000, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.05);
                }, 60);
            } catch (e) {
                console.log("Audio error");
            }
        }

        // カメラ起動
        function startScanner() {
            document.getElementById('result').innerText = "カメラをじゅんび　しています";
            document.getElementById('guide').innerText = "しかくのなかに うつしてください";
            document.getElementById('go-btn').style.display = "none"; 
            targetUrl = "";

            if (!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("reader");
            }

            const config = {
                fps: 20, 
                qrbox: { width: 320, height: 140 },
                experimentalFeatures: { useBarCodeDetectorIfSupported: true }
            };

            html5Qrcode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess, 
                onScanFailure
            ).then(() => {
                document.getElementById('result').innerText = "うつしてください";
            }).catch(err => {
                document.getElementById('result').innerText = "うつりません";
            });
        }

        // 読み取り成功
        function onScanSuccess(decodedText, decodedResult) {
            playBeep();
            if (navigator.vibrate) { navigator.vibrate([100, 50, 100]); }

            document.getElementById('guide').innerText = "よみとれました";
            
            // カメラを完全に停止
            html5Qrcode.stop().then(() => {
                
                // 1. まずはURLかどうかを判定
                let isUrl = false;
                try {
                    new URL(decodedText.trim());
                    isUrl = true;
                } catch(e) {}

                // 2. URLだった場合の処理
                if (isUrl) {
                    targetUrl = decodedText.trim();
                    document.getElementById('result').innerText = "ホームページがみつかりました"; 
                    document.getElementById('go-btn').style.display = "block";   
                } 
                // 3. URLではなかった場合（数字や長い文字コードなど）の処理
                else {
                    if (decodedText.length > 40) {
                        document.getElementById('result').innerText = "よみとれました";
                    } else {
                        document.getElementById('result').innerText = decodedText; 
                    }
                }
            }).catch(err => {
                console.error(err);
            });
        }

        function onScanFailure(error) {}

        function openTargetUrl() {
            if (targetUrl) {
                window.location.href = targetUrl;
            }
        }

        startScanner();
    </script>
</body>
</html>
